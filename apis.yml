aid: vouch-co
name: Vouch
description: >-
  Vouch is a San Francisco, California business insurance broker and risk
  advisor purpose-built for high-growth startups and the venture ecosystem.
  Founded in 2018 by Sam Hodges and Travis Hedge and backed by investors
  including Ribbit Capital, SVB Capital, Redpoint Ventures, Y Combinator,
  and MS&AD Ventures, Vouch offers a tailored portfolio of commercial
  coverages — Directors & Officers (D&O), Errors & Omissions (E&O / Tech
  E&O / Professional Services E&O), Cyber, Employment Practices Liability
  (EPL), General Liability, Business Property, Fiduciary, Crime, and
  contract-required coverages — sold to technology, healthcare and life
  sciences, financial services, and professional services companies. The
  business model is broker-of-record commissions and, since 2021, a
  Vouch-owned insurance carrier underwriting select lines. Vouch is best
  known in the developer community for its embedded insurance program,
  which lets ecosystem partners (Carta, StartupOS, and similar founder
  platforms) pre-fill applications, surface quotes, and bind coverage
  inline via Vouch's partner API. Public developer documentation, an
  OpenAPI specification, and a self-serve sandbox are not exposed; the
  partner API and Vouch Corporate documentation (hosted on GitBook) are
  gated to onboarded venture, technology, and service-provider partners
  contracted through hello@vouch.us.
